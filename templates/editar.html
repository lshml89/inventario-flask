<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="form-card">
    <h2>Editar Productos</h2>

    <form method="POST">
        <label>Nombre del Producto</label>
        <input type="text" name="nombre" value="{{ producto.nombre }}" required>

        <label>Precio</label>
        <input type="number" step="0.01" name="precio" value="{{ producto.precio }}" required>

        <label>Stock</label>
        <input type="number" name="stock" value="{{ producto.stock }}" required>

        <label>Categoría</label>
        <select name="categoria">
            <option {{ 'selected' if producto.categoria=='Granos' else '' }}>Granos</option>
            <option {{ 'selected' if producto.categoria=='Bebidas' else '' }}>Bebidas</option>
            <option {{ 'selected' if producto.categoria=='Lácteos' else '' }}>Lácteos</option>
            <option {{ 'selected' if producto.categoria=='Limpieza' else '' }}>Limpieza</option>
        </select>

        <div class="form-buttons">
            <button type="submit">Editar</button>
            <a href="{{ url_for('inventario') }}" class="btn">Volver</a>
        </div>
    </form>
</div>

</body>
</html>
